<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой первый WebAR</title>
    
    <!-- Подключаем библиотеку model-viewer -->
    <script type="module" 
            src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f0f0;
        }
        model-viewer {
            width: 100%;
            height: 500px;
            background-color: #ffffff;
            border-radius: 12px;
        }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>🚀 Мой первый WebAR</h1>
    <p>Покрутите астронавта пальцем. На телефоне появится кнопка AR.</p>
    
    <model-viewer 
        src="https://drive.google.com/file/d/1YwdykQokZ5yTNEZzJgDcqY_J54Dtw5Xh/view?usp=sharing" 
        alt="3D модель астронавта"
        ar 
        ar-modes="webxr scene-viewer quick-look"
        camera-controls 
        auto-rotate
        shadow-intensity="1">
    </model-viewer>
    
    <p style="margin-top: 20px; color: #666;">
        Если вы на телефоне — нажмите на кнопку с иконкой куба внизу модели.
    </p>
</body>
</html>
